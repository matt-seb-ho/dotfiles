[main]
font = monospace:size=12
icons-enabled = false
prompt = ""
dpi-aware = no
use-bold = false
inner-pad = 5
vertical-pad = 20
horizontal-pad = 20
# minimal-lines = true

[border]
width = 0
radius = 0

[colors]
background      = 232136FF   
# Base (deep violet-black)
border          = 908CAAFF   
# Subtle (muted lavender-gray)
text            = E0DEF4FF   
# Text (soft off-white)
match           = EB6F92FF   
# Love (pink-red highlight)
placeholder     = 6E6A86FF   
# Muted (dim gray-lavender)
selection       = 393552FF   
# Overlay (slightly lighter than base)
selection-text  = E0DEF4FF   
# Text (keeps contrast on selection)
selection-match = F6C177FF   
# Gold (stands out against selection)


[key-bindings]
delete-line-forward = none
next = Down Control+j
prev = Up Control+k
next-page = Shift+j
prev-page = Shift+k
